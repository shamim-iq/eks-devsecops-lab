apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: devsecops-eks-cluster
  region: us-east-1
  version: "1.35"

iam:
  withOIDC: true

managedNodeGroups:
  - name: dev-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 20
    ssh:
      allow: false

addons:
  - name: vpc-cni
  - name: kube-proxy
  - name: coredns
  - name: aws-ebs-csi-driver
